# Internship Finder Configuration
# Edit this file with your personal settings before running the tool.

search:
  location: "Austin, TX"
  target_season: "summer 2026"   # only keep listings for this season (or undated)
  exclude_title_patterns:
    - "fall 2026"
    - "fall 2025"
    - "july to december"
    - "co-op"
    - "co op"
    - "spring 2026"
    - "spring 2027"
    - "winter 2026"
    - "mid-year"
    - "part.time"
  keywords:
    - "Software Engineering intern"
    - "Software Developer intern"
    - "Computer Engineering intern"
    - "Computer Science intern"
    - "Backend Engineer intern"
    - "Frontend Engineer intern"
    - "Full Stack intern"
    - "DevOps intern"
    - "Cloud Engineer intern"
    - "Data Engineer intern"
    - "Embedded Software intern"
    - "Systems Engineer intern"
    - "AI intern"
    - "Machine Learning intern"
    - "Cybersecurity intern"
  max_days_old: 30
  min_score: 40

target_companies:
  - name: "Dell Technologies"
    careers_url: "https://jobs.dell.com/search-jobs/intern/Austin%2C-TX/375/4/5344959/32x72541/-97x33122/50/2"
  - name: "Apple"
    careers_url: "https://jobs.apple.com/en-us/search?location=austin-AUS&team=internships-STDNT-INTRN"
  - name: "Google"
    careers_url: "https://careers.google.com/jobs/results/?location=Austin%2C%20TX%2C%20USA&q=intern"
  - name: "Amazon"
    careers_url: "https://www.amazon.jobs/en/search?loc_query=Austin%2C%20Texas%2C%20USA&base_query=intern"
  - name: "Oracle"
    careers_url: "https://careers.oracle.com/jobs/#en/sites/jobsearch/requisitions?keyword=intern&location=Austin"
  - name: "Silicon Labs"
    careers_url: "https://www.silabs.com/about-us/careers/job-search?q=intern&l=Austin"
  - name: "NXP Semiconductors"
    careers_url: "https://nxp.wd3.myworkdayjobs.com/careers?q=intern&locations=0c38ee67a8be01905b8d7e4d798ca909"
  - name: "Charles Schwab"
    careers_url: "https://schwab.wd5.myworkdayjobs.com/Schwab?q=intern&locations=84b2f6dfba96013a48dfabf838d14c5e"

greenhouse_boards:
  - { slug: "cloudflare",      name: "Cloudflare" }
  - { slug: "solarwinds",      name: "SolarWinds" }

lever_boards:
  - { slug: "bazaarvoice",     name: "Bazaarvoice" }

email:
  enabled: false
  sender_email: "${EMAIL_SENDER_EMAIL}"
  sender_app_password: "${EMAIL_SENDER_APP_PASSWORD}"
  recipient_email: "${EMAIL_RECIPIENT_EMAIL}"
  digest_time: "08:00"

profile:
  first_name: "Jack"
  last_name: "Donahoo"
  email: "${PROFILE_EMAIL}"
  phone: "${PROFILE_PHONE}"
  linkedin_url: ""
  github_url: ""
  portfolio_url: ""
  university: ""
  major: "Computer Science"
  gpa: ""
  graduation_year: "2027"
  resume_path: "${RESUME_PATH}"

browser:
  headless: false
  slow_mo: 50
  request_delay_min: 2
  request_delay_max: 5

linkedin:
  enabled: true
  email: "${LINKEDIN_EMAIL}"
  password: "${LINKEDIN_PASSWORD}"

indeed:
  enabled: true

handshake:
  enabled: false  # re-enable once TTU career center approves your account
  email: "${HANDSHAKE_EMAIL}"
  password: "${HANDSHAKE_PASSWORD}"
